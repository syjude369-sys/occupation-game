<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Base GameBoard · Territory</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="controls">
        <header>
          <h1>Base GameBoard · Territory</h1>
          <p>Inner-first orthogonal generator</p>
        </header>

        <section>
          <h2>Grid</h2>
          <div id="gridControls" class="stack"></div>
        </section>

        <section>
          <h2>Rings</h2>
          <div id="ringControls" class="stack"></div>
        </section>

        <section>
          <h2>Pivot Door</h2>
          <div id="pivotControls" class="stack"></div>
        </section>

        <section>
          <h2>Simulation</h2>
          <div id="simControls" class="stack"></div>
        </section>

        <section>
          <h2>Void</h2>
          <div id="voidControls" class="stack"></div>
        </section>

        <section>
          <h2>Display</h2>
          <div id="displayControls" class="stack"></div>
        </section>

        <button id="resetBtn" class="reset">Reset</button>
      </aside>

      <section class="drawing">
        <header class="topbar">
          <div>
            <strong>BASE GAMEBOARD</strong>
            <span id="subtitle">N*N grid + pivot doors + catwalk rings</span>
          </div>
          <div class="recordControls" aria-label="Board recording controls">
            <button id="recordBtn" class="recordButton" type="button">● REC</button>
            <button id="recordStopBtn" type="button" disabled>■ STOP</button>
            <button id="videoDownloadBtn" type="button" disabled>↓ WEBM</button>
            <span id="recordStatus">READY</span>
          </div>
          <div class="legend" id="legend"></div>
        </header>
        <div class="viewport">
          <svg id="boardSvg" aria-label="Base gameboard plan"></svg>
        </div>
        <footer class="bottombar">
          <span id="readout">Ready.</span>
          <span>orthogonal / mm</span>
        </footer>
      </section>

      <aside class="inspector">
        <section class="card">
          <h2>Dimensions</h2>
          <dl id="dimensionList"></dl>
        </section>
        <section class="card">
          <h2>Counts</h2>
          <dl id="countList"></dl>
        </section>
        <section class="card">
          <h2>Log</h2>
          <pre id="logOutput"></pre>
        </section>
        <section class="card">
          <h2>Export</h2>
          <div class="exportRow">
            <button id="jsonBtn">JSON</button>
            <button id="svgBtn">SVG</button>
          </div>
        </section>
      </aside>
    </main>
    <canvas id="recordCanvas" width="1920" height="1080" hidden></canvas>
    <script type="module" src="./app.js"></script>
  </body>
</html>
